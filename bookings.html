<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chill-Inn | Οι Κρατήσεις μου</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0d0a;
            color: #e8d5b0;
            min-height: 100vh;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 50;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15,13,10,0.92);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #1e1a14;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            color: #c9a84c;
            text-decoration: none;
            font-weight: 500;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #userGreeting {
            display: none;
            color: #c9a84c;
            font-size: 12px;
        }

        #logoutBtn {
            display: none;
            background: transparent;
            border: 1px solid #2a2520;
            color: #6b5d4a;
            padding: 6px 12px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 11px;
            font-family: 'Inter', sans-serif;
        }

        #logoutBtn:hover { border-color: #c9a84c; color: #c9a84c; }

        .hamburger {
            color: #e8d5b0;
            font-size: 20px;
            cursor: pointer;
            background: none;
            border: none;
        }

        #navMenu {
            display: none;
            position: fixed;
            top: 60px;
            right: 0;
            background: #1a1714;
            border-left: 1px solid #2a2520;
            padding: 20px;
            z-index: 49;
            min-width: 200px;
            border-radius: 0 0 0 16px;
        }

        #navMenu a {
            display: block;
            color: #e8d5b0;
            text-decoration: none;
            padding: 10px 0;
            font-size: 14px;
            border-bottom: 1px solid #2a2520;
        }

        #navMenu a:last-child { border-bottom: none; }
        #navMenu a:hover { color: #c9a84c; }

        .page-hero {
            padding: 100px 24px 40px;
            text-align: center;
        }

        .page-hero h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 40px;
            color: #f0e6cc;
            font-weight: 400;
            margin-bottom: 8px;
        }

        .page-hero p {
            color: #6b5d4a;
            font-size: 14px;
        }

        /* STATS BAR */
        .stats-bar {
            display: flex;
            gap: 12px;
            padding: 0 24px 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .stat-pill {
            background: #1a1714;
            border: 1px solid #2a2520;
            border-radius: 50px;
            padding: 8px 18px;
            font-size: 12px;
            color: #6b5d4a;
        }

        .stat-pill span {
            color: #c9a84c;
            font-weight: 500;
            margin-right: 4px;
        }

        /* BOOKINGS LIST */
        .bookings-container {
            padding: 0 24px 80px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 0;
            color: #6b5d4a;
            font-size: 14px;
        }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 2px solid #2a2520;
            border-top-color: #c9a84c;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 0;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-state h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            color: #f0e6cc;
            font-weight: 400;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #6b5d4a;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .btn-gold {
            background: #c9a84c;
            color: #0f0d0a;
            padding: 14px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            display: inline-block;
        }

        /* Booking Card */
        .booking-card {
            background: #1a1714;
            border: 1px solid #2a2520;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            position: relative;
            transition: border-color 0.3s;
        }

        .booking-card:hover { border-color: #3a3020; }

        .booking-card.cancelled {
            opacity: 0.5;
            border-style: dashed;
        }

        .booking-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
        }

        .booking-type {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            color: #f0e6cc;
            font-weight: 400;
        }

        .booking-status {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 50px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .status-confirmed {
            background: #0a1f0f;
            color: #4a9a6b;
            border: 1px solid #1a3f2a;
        }

        .status-upcoming {
            background: #1f1a00;
            color: #c9a84c;
            border: 1px solid #3a3000;
        }

        .status-cancelled {
            background: #1f0a0a;
            color: #6b3030;
            border: 1px solid #3a1a1a;
        }

        .status-past {
            background: #1a1a1a;
            color: #4a4a4a;
            border: 1px solid #2a2a2a;
        }

        .booking-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .booking-detail {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .detail-label {
            font-size: 10px;
            color: #6b5d4a;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .detail-value {
            font-size: 13px;
            color: #e8d5b0;
        }

        .booking-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 14px;
            border-top: 1px solid #1e1a14;
        }

        .booking-price {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            color: #c9a84c;
            font-weight: 500;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid #2a1010;
            color: #6b3030;
            padding: 7px 14px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 11px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .btn-cancel:hover {
            border-color: #c9504c;
            color: #c9504c;
        }

        /* Pod type colors */
        .type-sleep { border-left: 3px solid #c9a84c; }
        .type-silent { border-left: 3px solid #4ca8c9; }
        .type-massage { border-left: 3px solid #a84cc9; }
        .type-locker { border-left: 3px solid #4a9a6b; }

        /* Confirm cancel modal */
        .confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .confirm-overlay.active { display: flex; }

        .confirm-modal {
            background: #1a1714;
            border: 1px solid #c9504c;
            border-radius: 20px;
            padding: 30px;
            max-width: 340px;
            width: 100%;
            text-align: center;
        }

        .confirm-modal h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            color: #f0e6cc;
            font-weight: 400;
            margin-bottom: 10px;
        }

        .confirm-modal p {
            color: #6b5d4a;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .confirm-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-confirm-cancel {
            flex: 1;
            padding: 12px;
            background: #c9504c;
            color: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
        }

        .btn-keep {
            flex: 1;
            padding: 12px;
            background: transparent;
            color: #e8d5b0;
            border: 1px solid #2a2520;
            border-radius: 50px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
        }

        footer {
            text-align: center;
            padding: 40px 24px;
            border-top: 1px solid #1e1a14;
        }

        .footer-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            color: #c9a84c;
            margin-bottom: 6px;
        }

        .footer-tagline { color: #3a3020; font-size: 12px; letter-spacing: 1px; }

        /* Not logged in */
        .not-logged-in {
            text-align: center;
            padding: 80px 24px;
        }

        .not-logged-in h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            color: #f0e6cc;
            font-weight: 400;
            margin-bottom: 12px;
        }

        .not-logged-in p {
            color: #6b5d4a;
            font-size: 14px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">≋ Chill-Inn</a>
        <div class="header-right">
            <span id="userGreeting"></span>
            <button id="logoutBtn" onclick="doLogout()">Logout</button>
            <button class="hamburger" onclick="toggleNav()">☰</button>
        </div>
    </header>

    <div id="navMenu">
        <a href="index.html">Αρχική</a>
        <a href="map.html">Χάρτης</a>
        <a href="bookings.html" style="color:#c9a84c;">Οι Κρατήσεις μου</a>
        <a href="auth.html">Σύνδεση</a>
    </div>

    <div class="page-hero">
        <h1>Οι Κρατήσεις μου</h1>
        <p id="pageSubtitle">Φόρτωση...</p>
    </div>

    <div class="stats-bar" id="statsBar" style="display:none;">
        <div class="stat-pill"><span id="statTotal">0</span> Σύνολο</div>
        <div class="stat-pill"><span id="statUpcoming">0</span> Προσεχείς</div>
        <div class="stat-pill"><span id="statTotal2">€0</span> Δαπάνη</div>
    </div>

    <div class="bookings-container" id="bookingsContainer">
        <div class="loading">
            <div class="loading-spinner"></div>
            Φόρτωση κρατήσεων...
        </div>
    </div>

    <!-- Cancel confirmation modal -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-modal">
            <h3>Ακύρωση Κράτησης</h3>
            <p>Είσαι σίγουρος ότι θέλεις να ακυρώσεις αυτή την κράτηση; Η ενέργεια δεν μπορεί να αναιρεθεί.</p>
            <div class="confirm-buttons">
                <button class="btn-confirm-cancel" onclick="confirmCancel()">Ναι, Ακύρωση</button>
                <button class="btn-keep" onclick="closeConfirm()">Κράτησε την</button>
            </div>
        </div>
    </div>

    <footer>
        <div style="color:#c9a84c; font-size:24px; margin-bottom:10px;">≋</div>
        <div class="footer-logo">Chill-Inn</div>
        <div class="footer-tagline">Βρες τη γαλήνη σου μέσα στο χάος.</div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCdlffKyzFdN47et7aK3dTyStaBcYLEw0Q",
            authDomain: "chill-inn-be1ad.firebaseapp.com",
            projectId: "chill-inn-be1ad",
            storageBucket: "chill-inn-be1ad.firebasestorage.app",
            messagingSenderId: "21671839334",
            appId: "1:21671839334:web:17ec636c61dcae34028fa7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let pendingCancelId = null;

        const podIcons = {
            'Sleep Pod': '',
            'Silent Booth': '',
            'Massage Pod': '',
            'Locker': ''
        };

        const podTypeClass = {
            'Sleep Pod': 'type-sleep',
            'Silent Booth': 'type-silent',
            'Massage Pod': 'type-massage',
            'Locker': 'type-locker'
        };

        function getBookingStatus(booking) {
            if (booking.cancelled) return { label: 'Ακυρώθηκε', cls: 'status-cancelled' };

            const today = new Date();
            today.setHours(0,0,0,0);

            // Parse date dd/mm/yyyy
            if (!booking.date) return { label: 'Επιβεβαιώθηκε', cls: 'status-confirmed' };
            const parts = booking.date.split('/');
            if (parts.length !== 3) return { label: 'Επιβεβαιώθηκε', cls: 'status-confirmed' };
            const bookDate = new Date(parseInt(parts[2]), parseInt(parts[1])-1, parseInt(parts[0]));

            if (bookDate < today) return { label: 'Ολοκληρώθηκε', cls: 'status-past' };
            if (bookDate.getTime() === today.getTime()) return { label: 'Σήμερα!', cls: 'status-confirmed' };
            return { label: 'Προσεχής', cls: 'status-upcoming' };
        }

        function renderBookings(bookings) {
            const container = document.getElementById('bookingsContainer');

            if (bookings.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon"></div>
                        <h3>Δεν έχεις κρατήσεις ακόμα</h3>
                        <p>Κάνε την πρώτη σου κράτηση και βρες τη γαλήνη σου!</p>
                        <a href="index.html" class="btn-gold">Κράτησε Pod →</a>
                    </div>`;
                return;
            }

            // Stats
            const total = bookings.length;
            const upcoming = bookings.filter(b => {
                const s = getBookingStatus(b);
                return s.label === 'Προσεχής' || s.label === 'Σήμερα!';
            }).length;
            const totalSpend = bookings.filter(b => !b.cancelled).reduce((sum, b) => sum + (b.total || 0), 0);

            document.getElementById('statTotal').innerText = total;
            document.getElementById('statUpcoming').innerText = upcoming;
            document.getElementById('statTotal2').innerText = '€' + totalSpend;
            document.getElementById('statsBar').style.display = 'flex';

            container.innerHTML = bookings.map(b => {
                const status = getBookingStatus(b);
                const icon = '';
                const typeClass = podTypeClass[b.pod] || '';
                const podLabel = b.podNumber ? ` #${b.podNumber}` : '';
                const canCancel = !b.cancelled && status.label !== 'Ολοκληρώθηκε';

                return `
                <div class="booking-card ${typeClass} ${b.cancelled ? 'cancelled' : ''}">
                    <div class="booking-header">
                        <div class="booking-type">${b.pod}${podLabel}</div>
                        <div class="booking-status ${status.cls}">${status.label}</div>
                    </div>
                    <div class="booking-details">
                        <div class="booking-detail">
                            <span class="detail-label">Ζώνη</span>
                            <span class="detail-value">${b.zone || '—'}</span>
                        </div>
                        <div class="booking-detail">
                            <span class="detail-label">Ημερομηνία</span>
                            <span class="detail-value">${b.date || '—'}</span>
                        </div>
                        <div class="booking-detail">
                            <span class="detail-label">Ώρα</span>
                            <span class="detail-value">${b.time || '—'}</span>
                        </div>
                        <div class="booking-detail">
                            <span class="detail-label">Διάρκεια</span>
                            <span class="detail-value">${b.duration || 1} ώρα(ες)</span>
                        </div>
                        ${b.locker ? `
                        <div class="booking-detail">
                            <span class="detail-label">Locker</span>
                            <span class="detail-value">Ναι (+€5)</span>
                        </div>` : ''}
                        <div class="booking-detail">
                            <span class="detail-label">Κρατήθηκε από</span>
                            <span class="detail-value">${b.name || b.userName || '—'}</span>
                        </div>
                    </div>
                    <div class="booking-footer">
                        <div class="booking-price">€${b.total || 0}</div>
                        ${canCancel ? `<button class="btn-cancel" onclick="askCancel('${b.id}')">Ακύρωση</button>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        async function loadBookings(user) {
            try {
                const q = query(
                    collection(db, 'bookings'),
                    where('userId', '==', user.uid)
                );
                const snapshot = await getDocs(q);
                const bookings = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));

                // Sort by date descending (newest first)
                bookings.sort((a, b) => {
                    const da = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(0);
                    const db2 = b.createdAt?.toDate ? b.createdAt.toDate() : new Date(0);
                    return db2 - da;
                });

                document.getElementById('pageSubtitle').innerText =
                    bookings.length > 0 ? bookings.length + ' κρατήσεις βρέθηκαν' : 'Καμία κράτηση ακόμα';

                renderBookings(bookings);
            } catch(e) {
                console.error(e);
                document.getElementById('bookingsContainer').innerHTML =
                    '<div class="loading" style="color:#c9504c;">Σφάλμα φόρτωσης. Δοκίμασε ξανά.</div>';
            }
        }

        window.askCancel = function(bookingId) {
            pendingCancelId = bookingId;
            document.getElementById('confirmOverlay').classList.add('active');
        }

        window.confirmCancel = async function() {
            if (!pendingCancelId) return;
            try {
                await updateDoc(doc(db, 'bookings', pendingCancelId), { cancelled: true });
                closeConfirm();
                // Reload
                const user = auth.currentUser;
                if (user) loadBookings(user);
            } catch(e) {
                console.error(e);
                alert('Σφάλμα ακύρωσης. Δοκίμασε ξανά.');
            }
        }

        window.closeConfirm = function() {
            pendingCancelId = null;
            document.getElementById('confirmOverlay').classList.remove('active');
        }

        window.doLogout = async function() {
            await signOut(auth);
            window.location.href = 'auth.html';
        }

        window.toggleNav = function() {
            const nav = document.getElementById('navMenu');
            nav.style.display = nav.style.display === 'none' ? 'block' : 'none';
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userGreeting').innerText = '👤 ' + (user.displayName || user.email);
                document.getElementById('userGreeting').style.display = 'inline';
                document.getElementById('logoutBtn').style.display = 'inline-block';
                loadBookings(user);
            } else {
                document.getElementById('bookingsContainer').innerHTML = `
                    <div class="not-logged-in">
                        <h2>Συνδέσου πρώτα</h2>
                        <p>Πρέπει να είσαι συνδεδεμένος για να δεις τις κρατήσεις σου.</p>
                        <a href="auth.html" class="btn-gold">Σύνδεση →</a>
                    </div>`;
                document.getElementById('pageSubtitle').innerText = 'Απαιτείται σύνδεση';
            }
        });
    </script>

</body>
</html>
