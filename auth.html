<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chill-Inn | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0d0a;
            color: #e8d5b0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px 24px;
            border-bottom: 1px solid #1e1a14;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            color: #c9a84c;
            text-decoration: none;
        }

        .logo-waves { color: #c9a84c; letter-spacing: -2px; }

        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }

        .auth-box {
            width: 100%;
            max-width: 380px;
        }

        .auth-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 36px;
            color: #f0e6cc;
            margin-bottom: 8px;
            font-weight: 400;
        }

        .auth-subtitle {
            color: #6b5d4a;
            font-size: 14px;
            margin-bottom: 35px;
        }

        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 30px;
            border-bottom: 1px solid #1e1a14;
        }

        .tab {
            padding: 12px 20px;
            cursor: pointer;
            font-size: 14px;
            color: #6b5d4a;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.3s;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            font-family: 'Inter', sans-serif;
        }

        .tab.active {
            color: #c9a84c;
            border-bottom-color: #c9a84c;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 11px;
            color: #6b5d4a;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #2a2520;
            background-color: #1a1714;
            color: #e8d5b0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #c9a84c;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #c9a84c;
            color: #0f0d0a;
            border: none;
            border-radius: 50px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            margin-top: 10px;
            transition: opacity 0.3s;
        }

        .btn-primary:hover { opacity: 0.85; }

        .error-msg {
            color: #e05555;
            font-size: 13px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }

        .success-msg {
            color: #4a9a6b;
            font-size: 13px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #3a3020;
            font-size: 12px;
            border-top: 1px solid #1e1a14;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <span class="logo-waves">≋</span> Chill-Inn
        </a>
    </header>

    <div class="auth-container">
        <div class="auth-box">
            <h1 class="auth-title">Καλώς ήρθες.</h1>
            <p class="auth-subtitle">Συνδέσου για να κάνεις κράτηση στο pod σου.</p>

            <div class="tabs">
                <button class="tab active" onclick="showTab('login')">Σύνδεση</button>
                <button class="tab" onclick="showTab('register')">Εγγραφή</button>
            </div>

            <!-- LOGIN FORM -->
            <div id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <button class="btn-primary" onclick="login()">Σύνδεση</button>
                <p class="error-msg" id="loginError"></p>
            </div>

            <!-- REGISTER FORM -->
            <div id="registerForm" style="display:none;">
                <div class="form-group">
                    <label>Όνομα</label>
                    <input type="text" id="registerName" placeholder="Το όνομά σου">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="registerPassword" placeholder="Τουλάχιστον 6 χαρακτήρες">
                </div>
                <button class="btn-primary" onclick="register()">Εγγραφή</button>
                <p class="error-msg" id="registerError"></p>
                <p class="success-msg" id="registerSuccess"></p>
            </div>

        </div>
    </div>

    <footer>© 2026 Chill-Inn | Airport Relaxation Services</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCdlffKyzFdN47et7aK3dTyStaBcYLEw0Q",
            authDomain: "chill-inn-be1ad.firebaseapp.com",
            projectId: "chill-inn-be1ad",
            storageBucket: "chill-inn-be1ad.firebasestorage.app",
            messagingSenderId: "21671839334",
            appId: "1:21671839334:web:17ec636c61dcae34028fa7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.login = async function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');

            if (!email || !password) {
                errorEl.style.display = 'block';
                errorEl.innerText = 'Παρακαλώ συμπλήρωσε όλα τα πεδία!';
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'index.html';
            } catch (error) {
                errorEl.style.display = 'block';
                errorEl.innerText = 'Λάθος email ή password!';
            }
        }

        window.register = async function() {
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const errorEl = document.getElementById('registerError');
            const successEl = document.getElementById('registerSuccess');

            if (!name || !email || !password) {
                errorEl.style.display = 'block';
                errorEl.innerText = 'Παρακαλώ συμπλήρωσε όλα τα πεδία!';
                return;
            }

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(userCredential.user, { displayName: name });
                successEl.style.display = 'block';
                successEl.innerText = '✅ Εγγραφή επιτυχής! Ανακατεύθυνση...';
                setTimeout(() => window.location.href = 'index.html', 1500);
            } catch (error) {
                errorEl.style.display = 'block';
                if (error.code === 'auth/email-already-in-use') {
                    errorEl.innerText = 'Το email χρησιμοποιείται ήδη!';
                } else if (error.code === 'auth/weak-password') {
                    errorEl.innerText = 'Το password πρέπει να έχει τουλάχιστον 6 χαρακτήρες!';
                } else {
                    errorEl.innerText = 'Κάτι πήγε στραβά, δοκίμασε ξανά!';
                }
            }
        }
    </script>

    <script>
        function showTab(tab) {
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }
    </script>

</body>
</html>
