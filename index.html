<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airport Pods</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0a0a2e;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #1a1a4e;
            padding: 20px;
        }

        h1 { color: #00d4ff; }

        .pods-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 50px;
            flex-wrap: wrap;
        }

        .pod-card {
            background-color: #1a1a4e;
            border-radius: 15px;
            padding: 30px;
            width: 200px;
        }

        .pod-card h2 { color: #00d4ff; }
        .pod-card p { color: #aaaacc; }

        .pod-card button {
            background-color: #00d4ff;
            color: #0a0a2e;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background-color: #1a1a4e;
            border-radius: 15px;
            padding: 30px;
            width: 320px;
            text-align: left;
        }

        .modal h2 { color: #00d4ff; text-align: center; }

        .modal label {
            display: block;
            margin-top: 15px;
            color: #aaaacc;
            font-size: 14px;
        }

        .modal input, .modal select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 8px;
            border: none;
            background-color: #0a0a2e;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
        }

        .modal .total {
            margin-top: 20px;
            text-align: center;
            font-size: 20px;
            color: #00d4ff;
            font-weight: bold;
        }

        .modal .btn-confirm {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background-color: #00d4ff;
            color: #0a0a2e;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        .modal .btn-close {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            background-color: transparent;
            color: #aaaacc;
            border: 1px solid #aaaacc;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>✈️ Airport Pods</h1>
        <p>Χαλάρωσε, ξεκουράσου, συνέχισε το ταξίδι σου</p>
    </header>

    <div class="pods-container">
        <div class="pod-card">
            <h2>😴 Sleep Pod</h2>
            <p>Ξεκουράσου πριν την πτήση σου</p>
            <p><strong>€15/ώρα</strong></p>
            <button onclick="openModal('Sleep Pod', 15)">Κράτηση</button>
        </div>
        <div class="pod-card">
            <h2>🤫 Silent Booth</h2>
            <p>Ησυχία για δουλειά ή χαλάρωση</p>
            <p><strong>€10/ώρα</strong></p>
            <button onclick="openModal('Silent Booth', 10)">Κράτηση</button>
        </div>
        <div class="pod-card">
            <h2>💆 Massage Pod</h2>
            <p>Χαλάρωσε τους μυς σου</p>
            <p><strong>€20/ώρα</strong></p>
            <button onclick="openModal('Massage Pod', 20)">Κράτηση</button>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalTitle">Κράτηση</h2>

            <label>Όνομα</label>
            <input type="text" id="inputName" placeholder="Το όνομά σου">

            <label>Ημερομηνία</label>
            <input type="date" id="inputDate">

            <label>Ώρα</label>
            <input type="time" id="inputTime">

            <label>Διάρκεια</label>
            <select id="inputDuration" onchange="updateTotal()">
                <option value="1">1 ώρα</option>
                <option value="2">2 ώρες</option>
                <option value="3">3 ώρες</option>
                <option value="4">4 ώρες</option>
            </select>

            <div class="total" id="totalCost">Σύνολο: €0</div>

            <button class="btn-confirm" onclick="confirmBooking()">✅ Επιβεβαίωση</button>
            <button class="btn-close" onclick="closeModal()">Άκυρο</button>
        </div>
    </div>

    <script>
        let currentPrice = 0;

        function openModal(podName, price) {
            currentPrice = price;
            document.getElementById('modalTitle').innerText = '📋 Κράτηση: ' + podName;
            document.getElementById('totalCost').innerText = 'Σύνολο: €' + price;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        function updateTotal() {
            const duration = document.getElementById('inputDuration').value;
            const total = currentPrice * duration;
            document.getElementById('totalCost').innerText = 'Σύνολο: €' + total;
        }

        function confirmBooking() {
            const name = document.getElementById('inputName').value;
            const date = document.getElementById('inputDate').value;
            const time = document.getElementById('inputTime').value;
            const duration = document.getElementById('inputDuration').value;

            if (!name || !date || !time) {
                alert('Παρακαλώ συμπλήρωσε όλα τα πεδία!');
                return;
            }

            const total = currentPrice * duration;
            alert('✅ Η κράτησή σου επιβεβαιώθηκε!\n\nΌνομα: ' + name + '\nΗμερομηνία: ' + date + '\nΏρα: ' + time + '\nΔιάρκεια: ' + duration + ' ώρα(ες)\nΣύνολο: €' + total);
            closeModal();
        }
    </script>

</body>
</html>
